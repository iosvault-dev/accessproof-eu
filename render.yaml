services:
  - type: web
    name: accessproof-eu
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 60
    envVars:
      - key: GROWTH_CHECKOUT_URL
        sync: false
      - key: PRO_CHECKOUT_URL
        sync: false
      - key: CONTACT_EMAIL
        sync: false
